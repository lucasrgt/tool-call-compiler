name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates/npm packages instead of dry-run only"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  package:
    name: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: Swatinem/rust-cache@v2

      - run: cargo test --workspace
      - run: cargo run -p xtask -- check
      - run: npm ci
      - run: npm test

      - name: Package Rust seed crate
        run: |
          mkdir -p artifacts/crates
          cargo package --manifest-path crates/tool-compiler-ir/Cargo.toml
          cp target/package/*.crate artifacts/crates/
          cargo metadata --no-deps --format-version 1 > artifacts/crates/workspace-metadata.json

      - name: Package npm SDK
        run: |
          npm pack --workspace @tool-compiler/sdk-node --pack-destination artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: tool-call-compiler-packages
          path: artifacts

      - name: Publish crates
        if: ${{ github.event.inputs.publish == 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for manifest in crates/tool-compiler-{ir,graph,optimizer,runtime,planner,adapter-fs,adapter-http,adapter-mcp,adapter-shell,cli}/Cargo.toml; do
            cargo publish --manifest-path "$manifest"
          done

      - name: Publish npm SDK
        if: ${{ github.event.inputs.publish == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @tool-compiler/sdk-node --access public
