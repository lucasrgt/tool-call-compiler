name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish crates/npm packages"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: Swatinem/rust-cache@v2
      - run: npm ci
      - run: cargo run -p xtask -- check
      - run: npm test
      - run: npm run build

  binaries:
    name: binaries (${{ matrix.target.os }})
    needs: gate
    runs-on: ${{ matrix.target.os }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - { os: ubuntu-latest, suffix: linux-x86_64, exe: tool-compiler }
          - { os: windows-latest, suffix: windows-x86_64, exe: tool-compiler.exe }
          - { os: macos-latest, suffix: macos-aarch64, exe: tool-compiler }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p tool-compiler-cli
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p artifacts
          cp "target/release/${{ matrix.target.exe }}" "artifacts/tool-compiler-${{ matrix.target.suffix }}${{ matrix.target.exe == 'tool-compiler.exe' && '.exe' || '' }}"
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target.suffix }}
          path: artifacts

  github-release:
    name: github release
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish:
    name: publish packages
    needs: gate
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - uses: Swatinem/rust-cache@v2
      - run: npm ci

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          crates=(
            tool-compiler-ir
            tool-compiler-adapter-api
            tool-compiler-graph
            tool-compiler-optimizer
            tool-compiler-runtime
            tool-compiler-planner
            tool-compiler-adapter-fs
            tool-compiler-adapter-http
            tool-compiler-adapter-mcp
            tool-compiler-adapter-shell
            tool-compiler-cli
          )
          for crate in "${crates[@]}"; do
            # Retry: freshly published dependencies take a moment to appear
            # in the sparse index, which makes the next publish flaky.
            for attempt in 1 2 3 4 5; do
              if cargo publish -p "$crate"; then
                break
              fi
              if [ "$attempt" = "5" ]; then
                echo "publishing $crate failed after $attempt attempts" >&2
                exit 1
              fi
              echo "retrying $crate in 30s (attempt $attempt failed)"
              sleep 30
            done
          done

      - name: Publish npm SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @tool-compiler/sdk-node --access public --provenance
